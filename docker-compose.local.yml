services:
  tldiagram:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CADDYFILE: Caddyfile.local
    container_name: tldiagram-app-local
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
